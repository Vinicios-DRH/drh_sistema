<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Geográfico - Efetivo</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- HEADER --- */
        #header {
            padding: 15px 30px;
            background-color: #1a1a1a;
            border-bottom: 2px solid #d32f2f;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        .header-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        #header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #d32f2f;
            font-weight: bold;
        }

        /* --- CONTAINER PRINCIPAL (MAPA + MODAL) --- */
        #container-principal {
            position: relative;
            flex-grow: 1;
            display: flex;
            overflow: hidden;
            width: 100vw;
        }

        #mapa {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- FOOTER DE ESTATÍSTICAS --- */
        #footer-stats {
            background-color: #1a1a1a;
            border-top: 2px solid #d32f2f;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            flex-shrink: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px;
        }

        .stat-card {
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .stat-title {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #d32f2f;
        }

        /* --- CLUSTERIZAÇÃO E MARKERS --- */
        .marker-cluster-small,
        .marker-cluster-medium,
        .marker-cluster-large {
            background-color: rgba(211, 47, 47, 0.6);
        }

        .marker-cluster-small div,
        .marker-cluster-medium div,
        .marker-cluster-large div {
            background-color: rgba(211, 47, 47, 0.9);
            color: white;
            font-weight: bold;
            border: 2px solid #121212;
        }

        .leaflet-div-icon.custom-text-icon {
            background: transparent;
            border: none;
            overflow: visible;
        }

        .pin-container {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .pin-logo {
            width: 32px;
            height: 32px;
            background-color: #ffffff;
            border-radius: 50%;
            border: 2px solid #d32f2f;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
            object-fit: contain;
            padding: 2px;
            transition: transform 0.2s ease, border-color 0.2s ease;
            z-index: 2;
        }

        .pin-text {
            background-color: rgba(26, 26, 26, 0.85);
            color: #ffffff;
            border: 1px solid #d32f2f;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            margin-top: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
            transition: background-color 0.2s ease;
            z-index: 1;
        }

        .pin-container:hover {
            z-index: 1000 !important;
        }

        .pin-container:hover .pin-logo {
            transform: scale(1.15);
            border-color: #ff5252;
        }

        .pin-container:hover .pin-text {
            background-color: #d32f2f;
            color: #ffffff;
        }

        /* --- TOOLTIP --- */
        .leaflet-tooltip.custom-tooltip {
            background-color: #1a1a1a;
            color: #fff;
            border-radius: 8px;
            border: 1px solid #d32f2f;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            padding: 12px;
        }

        .leaflet-tooltip-top.custom-tooltip:before {
            border-top-color: #d32f2f;
        }

        .popup-title {
            font-size: 16px;
            font-weight: bold;
            color: #e53935;
            margin-bottom: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }

        .popup-info {
            font-size: 14px;
            margin: 0 0 5px 0;
        }

        .efetivo-badge {
            display: inline-block;
            background-color: #d32f2f;
            color: #ffffff;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: bold;
        }

        /* --- MODAL LATERAL --- */
        #modal-efetivo {
            position: absolute;
            top: 0;
            right: -450px;
            width: 400px;
            max-width: 100vw;
            height: 100%;
            background-color: #1a1a1a;
            border-left: 2px solid #d32f2f;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        #modal-efetivo.aberta {
            right: 0;
        }

        .modal-header {
            padding: 20px;
            background-color: #d32f2f;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 18px;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chart-container {
            background-color: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .card-militar {
            background-color: #2a2a2a;
            padding: 10px 15px;
            border-radius: 6px;
            border-left: 4px solid #d32f2f;
            font-size: 14px;
        }

        .card-militar strong {
            color: #aaa;
            margin-right: 5px;
        }

        .loading {
            text-align: center;
            color: #aaa;
            margin-top: 20px;
        }

        /* Responsividade Básica */
        @media (max-width: 600px) {
            #header {
                flex-direction: column;
                text-align: center;
                padding: 15px;
                gap: 10px;
            }

            .header-logo {
                width: 60px;
                height: 60px;
            }

            .stat-value {
                font-size: 18px;
            }

            .stat-title {
                font-size: 10px;
            }
        }
    </style>
</head>

<body>

    <div id="header">
        <img src="/static/img/corpo_de_bombeiros_am_logo_circular.png" alt="Logo CBMAM" class="header-logo">
        <div>
            <h1>Painel Estratégico</h1>
            <p>Distribuição Operacional - Amazonas</p>
        </div>
    </div>

    <div id="container-principal">
        <div id="mapa"></div>

        <div id="modal-efetivo">
            <div class="modal-header">
                <h2 id="modal-titulo">Efetivo da OBM</h2>
                <button class="close-btn" onclick="fecharModal()">&times;</button>
            </div>
            <div class="modal-body" id="corpo-modal">
                <div id="loading-modal" class="loading" style="display: none;">Buscando dados no servidor...</div>

                <div class="chart-container" id="container-grafico" style="display: none;">
                    <canvas id="graficoEfetivo" style="max-height: 220px;"></canvas>
                </div>

                <div id="lista-militares"></div>
            </div>
        </div>
    </div>

    <div id="footer-stats">
        <div class="stat-card">
            <span class="stat-title">Efetivo Operacional Ativo</span>
            <span class="stat-value" id="stat-total">--</span>
        </div>
        <div class="stat-card">
            <span class="stat-title">Média de Idade</span>
            <span class="stat-value" id="stat-idade">-- anos</span>
        </div>
        <div class="stat-card">
            <span class="stat-title">Índice de Prontidão</span>
            <span class="stat-value" id="stat-prontidao">--</span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script>
        // 1. Inicializa Mapa
        const mapa = L.map('mapa', { zoomControl: false }).setView([-3.1190, -60.0217], 5);
        L.control.zoom({ position: 'bottomleft' }).addTo(mapa);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(mapa);

        // 2. Grupo de Clusterização
        const markerCluster = L.markerClusterGroup({
            maxClusterRadius: 40,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            zoomToBoundsOnClick: true
        });

        // 3. Contorno do Estado
        fetch('https://servicodados.ibge.gov.br/api/v3/malhas/estados/13?formato=application/vnd.geo+json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: '#d32f2f', weight: 2, opacity: 0.6, fillColor: '#d32f2f', fillOpacity: 0.05 }
                }).addTo(mapa);
            });

        // 4. Carregar Dados Globais (Rodapé)
        fetch('/api/estatisticas-gerais')
            .then(res => res.json())
            .then(data => {
                document.getElementById('stat-total').innerText = data.total;
                document.getElementById('stat-idade').innerText = data.media_idade + ' anos';
                document.getElementById('stat-prontidao').innerText = data.prontidao;
            });

        // 5. Carregar Markers e aplicar ao Cluster
        fetch('/api/mapa-dados')
            .then(response => response.json())
            .then(dados => {
                dados.forEach(dado => {
                    const textLabel = L.divIcon({
                        className: 'custom-text-icon',
                        html: `
                            <div class="pin-container">
                                <img class="pin-logo" src="/static/img/corpo_de_bombeiros_am_logo_circular.png" alt="Logo">
                                <div class="pin-text">${dado.obm}</div>
                            </div>
                        `,
                        iconSize: [0, 0]
                    });

                    const marcador = L.marker([dado.lat, dado.lng], { icon: textLabel });

                    const conteudoTooltip = `
                        <div class="popup-title">${dado.obm}</div>
                        <p class="popup-info"><strong>Base:</strong> ${dado.cidade}</p>
                        <p class="popup-info"><strong>Efetivo:</strong> <span class="efetivo-badge">${dado.efetivo}</span></p>
                        <p style="font-size: 11px; color: #888; margin-top: 8px; text-align: center;">Clique para análise da unidade</p>
                    `;

                    marcador.bindTooltip(conteudoTooltip, {
                        className: 'custom-tooltip',
                        direction: 'top',
                        offset: [0, -30],
                        opacity: 0.95
                    });

                    marcador.on('click', () => { abrirModalMilitares(dado.obm_id, dado.obm); });

                    // Adiciona ao grupo de cluster invés de direto no mapa
                    markerCluster.addLayer(marcador);
                });

                // Adiciona todo o cluster no mapa final
                mapa.addLayer(markerCluster);
            });

        // Variável global para destruir o gráfico anterior ao clicar em outro OBM
        let chartInstance = null;

        function abrirModalMilitares(obmId, obmSigla) {
            const modal = document.getElementById('modal-efetivo');
            const titulo = document.getElementById('modal-titulo');
            const lista = document.getElementById('lista-militares');
            const loader = document.getElementById('loading-modal');
            const containerGrafico = document.getElementById('container-grafico');

            modal.classList.add('aberta');
            titulo.innerText = obmSigla;

            // Estado de Carregamento
            lista.innerHTML = '';
            containerGrafico.style.display = 'none';
            loader.style.display = 'block';

            fetch(`/api/militares-obm/${obmId}`)
                .then(res => res.json())
                .then(data => {
                    loader.style.display = 'none';
                    const militares = data.militares;
                    const stats = data.stats;

                    if (!militares || militares.length === 0) {
                        lista.innerHTML = '<div class="loading">Nenhum militar registrado.</div>';
                        return;
                    }

                    // 1. Renderiza a Lista
                    let html = '';
                    militares.forEach(m => {
                        html += `<div class="card-militar"><strong>${m.posto}</strong> ${m.nome}</div>`;
                    });
                    lista.innerHTML = html;

                    // 2. Renderiza o Gráfico de Pizza
                    containerGrafico.style.display = 'block';
                    renderizarGrafico(stats);
                })
                .catch(erro => {
                    loader.style.display = 'none';
                    lista.innerHTML = '<div class="loading" style="color: #d32f2f;">Erro ao buscar dados.</div>';
                });
        }

        function renderizarGrafico(statsData) {
            const ctx = document.getElementById('graficoEfetivo').getContext('2d');

            // Destroi o gráfico antigo para não sobrepor
            if (chartInstance) {
                chartInstance.destroy();
            }

            const labels = Object.keys(statsData);
            const dados = Object.values(statsData);

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dados,
                        backgroundColor: [
                            '#d32f2f', '#ff5252', '#f44336', '#e57373',
                            '#b71c1c', '#c62828', '#ffffff', '#aaaaaa'
                        ],
                        borderWidth: 1,
                        borderColor: '#1a1a1a'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: '#ffffff', font: { size: 11 } }
                        }
                    }
                }
            });
        }

        function fecharModal() {
            document.getElementById('modal-efetivo').classList.remove('aberta');
        }
    </script>
</body>

</html>
