{% extends 'base.html' %}

{% block head %}
<link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>

<style>
    :root {
        --brand-blue-700: #0d2036;
        --brand-blue-600: #0c3761;
    }

    body {
        background: linear-gradient(135deg, #0e1726 0%, #0b2e4f 45%, #0b3a63 100%) fixed;
        min-height: 100vh;
    }

    .page-wrap {
        padding: 18px 10px;
    }

    .glass-card {
        background: rgba(255, 255, 255, .96);
        border: 1px solid rgba(0, 0, 0, .06);
        border-radius: 16px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, .12);
        overflow: hidden;
    }

    .brand-top {
        background: linear-gradient(90deg, var(--brand-blue-700) 0%, var(--brand-blue-600) 100%);
        color: #fff;
        padding: 16px 18px;
        border-bottom: 1px solid rgba(0, 0, 0, .06);
    }

    .brand-top h4 {
        margin: 0;
        font-weight: 900;
    }

    .muted {
        opacity: .85;
    }

    .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: end;
        padding: 14px 18px;
        border-bottom: 1px solid rgba(0, 0, 0, .06);
        background: rgba(255, 255, 255, .55);
    }

    .toolbar .grow {
        flex: 1 1 320px;
        min-width: 260px;
    }

    .table-wrap {
        padding: 12px 12px 18px;
    }
</style>
{% endblock %}

{% block body %}
<div class="container-fluid page-wrap">
    <div class="glass-card">
        <div class="brand-top d-flex align-items-start justify-content-between flex-wrap gap-2">
            <div>
                <h4><i class="bi bi-person-lines-fill"></i> Gestão do Efetivo</h4>
                <div class="muted small">Selecione a OBM para atualizar as situações (LTS, LE, etc) e especialidades.
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="grow">
                <label class="form-label small mb-1 fw-bold text-dark">Selecione a sua OBM</label>
                <select id="obmSelect" class="form-select border-secondary">
                    <option value="">— Selecione —</option>
                    {% for obm in lista_obms %}
                    <option value="{{ obm.id }}">{{ obm.sigla }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="table-wrap">
            <div id="tabelaContainer">
                <div class="text-muted text-center py-5">
                    <i class="bi bi-arrow-up-circle fs-1"></i>
                    <p class="mt-2">Selecione uma OBM acima para carregar o efetivo.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('obmSelect').addEventListener('change', function () {
        const obmId = this.value;
        const alvo = document.getElementById('tabelaContainer');

        if (!obmId) {
            alvo.innerHTML = '<div class="text-muted text-center py-5">Selecione uma OBM.</div>';
            return;
        }

        alvo.innerHTML = '<div class="text-center py-3">Carregando...</div>';

        fetch(`/gestao-chefia/tabela/${obmId}`)
            .then(r => r.text())
            .then(html => {
                alvo.innerHTML = html;

                // 1. Inicializa DataTable
                if ($.fn.dataTable.isDataTable('#militaresTable')) $('#militaresTable').DataTable().destroy();
                $('#militaresTable').DataTable({ scrollX: true, language: { url: '//cdn.datatables.net/plug-ins/1.11.5/i18n/Portuguese.json' } });

                // 2. Registrar o Modal
                const modalEl = document.getElementById('modalEdicaoChefia');
                const modalChefia = new bootstrap.Modal(modalEl);

                // 3. Captura cliques
                $('#militaresTable tbody').on('click', '.btn-editar', function () {
                    const btn = this;
                    
                    // Elementos do Modal
                    const switchPresente = document.getElementById('edit_presente_na_obm');
                    const divLocal = document.getElementById('div_local_disposicao');
                    const inputLocal = document.getElementById('edit_local_disposicao');
                    const blocoViatura = document.getElementById('bloco_viatura_diaria');
                    const selectViatura = document.getElementById('edit_viatura_diaria_id');

                    // Preenche campos
                    document.getElementById('edit_militar_id').value = btn.dataset.id;
                    document.getElementById('edit_obm_id').value = btn.dataset.obmId;
                    document.getElementById('modalNomeMilitar').textContent = btn.dataset.nome;
                    document.getElementById('edit_modalidade_id').value = btn.dataset.modalidade;
                    document.getElementById('edit_inicio_periodo').value = btn.dataset.inicio;
                    document.getElementById('edit_fim_periodo').value = btn.dataset.fim;

                    // Lógica Presença
                    switchPresente.checked = (btn.dataset.presente === 'true');
                    inputLocal.value = btn.dataset.local;
                    
                    // Exibir ou ocultar campo de local (força o estado inicial)
                    divLocal.style.display = switchPresente.checked ? 'none' : 'block';

                    // Lógica Viatura (Só aparece se for motorista)
                    // Lógica Viatura (Agora aparece para TODOS)
                    blocoViatura.style.display = 'block';
                    selectViatura.value = btn.dataset.viaturaDiaria || "";

                    // Especialidades
                    const cursosAtuais = JSON.parse(btn.dataset.cursos || "[]");
                    document.querySelectorAll('.check-curso').forEach(c => {
                        c.checked = cursosAtuais.includes(parseInt(c.value));
                    });

                    modalChefia.show();
                });

                // Lógica de Lógica do Switch (Precisa ser re-atribuída após injetar o HTML)
                document.getElementById('edit_presente_na_obm').addEventListener('change', function() {
                    document.getElementById('div_local_disposicao').style.display = this.checked ? 'none' : 'block';
                });

                // 4. Salvar
                document.getElementById('btnSalvarChefia').onclick = function() {
                    const btn = this;
                    btn.disabled = true;
                    fetch('/gestao-chefia/update', { method: 'POST', body: new FormData(document.getElementById('formAtualizacaoChefia')) })
                    .then(r => r.json())
                    .then(data => {
                        btn.disabled = false;
                        if (data.status === 'success') {
                            bootstrap.Modal.getInstance(document.getElementById('modalEdicaoChefia')).hide();
                            document.getElementById('obmSelect').dispatchEvent(new Event('change'));
                        } else { alert(data.message); }
                    });
                };
            });
    });
</script>
{% endblock %}
