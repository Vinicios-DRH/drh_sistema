{% extends 'base.html' %}

{% block head %}
<link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>

<style>
    :root {
        --brand-blue-700: #0d2036;
        --brand-blue-600: #0c3761;
    }

    body {
        background: linear-gradient(135deg, #0e1726 0%, #0b2e4f 45%, #0b3a63 100%) fixed;
        min-height: 100vh;
    }

    .page-wrap {
        padding: 18px 10px;
    }

    .glass-card {
        background: rgba(255, 255, 255, .96);
        border: 1px solid rgba(0, 0, 0, .06);
        border-radius: 16px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, .12);
        overflow: hidden;
    }

    .brand-top {
        background: linear-gradient(90deg, var(--brand-blue-700) 0%, var(--brand-blue-600) 100%);
        color: #fff;
        padding: 16px 18px;
        border-bottom: 1px solid rgba(0, 0, 0, .06);
    }

    .brand-top h4 {
        margin: 0;
        font-weight: 900;
    }

    .muted {
        opacity: .85;
    }

    .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: end;
        padding: 14px 18px;
        border-bottom: 1px solid rgba(0, 0, 0, .06);
        background: rgba(255, 255, 255, .55);
    }

    .toolbar .grow {
        flex: 1 1 320px;
        min-width: 260px;
    }

    .table-wrap {
        padding: 12px 12px 18px;
    }
</style>
{% endblock %}

{% block body %}
<div class="container-fluid page-wrap">
    <div class="glass-card">
        <div class="brand-top d-flex align-items-start justify-content-between flex-wrap gap-2">
            <div>
                <h4><i class="bi bi-person-lines-fill"></i> Gestão do Efetivo</h4>
                <div class="muted small">Selecione a OBM para atualizar as situações (LTS, LE, etc) e especialidades.
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="grow">
                <label class="form-label small mb-1 fw-bold text-dark">Selecione a sua OBM</label>
                <select id="obmSelect" class="form-select border-secondary">
                    <option value="">— Selecione —</option>
                    {% for obm in lista_obms %}
                    <option value="{{ obm.id }}">{{ obm.sigla }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="table-wrap">
            <div id="tabelaContainer">
                <div class="text-muted text-center py-5">
                    <i class="bi bi-arrow-up-circle fs-1"></i>
                    <p class="mt-2">Selecione uma OBM acima para carregar o efetivo.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('obmSelect').addEventListener('change', function () {
        const obmId = this.value;
        const alvo = document.getElementById('tabelaContainer');

        if (!obmId) {
            alvo.innerHTML = '<div class="text-muted text-center py-5">Selecione uma OBM.</div>';
            return;
        }

        alvo.innerHTML = '<div class="text-center py-3"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 text-muted">Carregando...</p></div>';

        fetch(`/gestao-chefia/tabela/${obmId}`)
            .then(r => r.text())
            .then(html => {
                alvo.innerHTML = html;

                if ($.fn.dataTable.isDataTable('#militaresTable')) $('#militaresTable').DataTable().destroy();
                $('#militaresTable').DataTable({ scrollX: true, language: { url: '//cdn.datatables.net/plug-ins/1.11.5/i18n/Portuguese.json' } });

                const modalEl = document.getElementById('modalEdicaoChefia');
                const modalChefia = new bootstrap.Modal(modalEl);

                // --- GATILHOS INTELIGENTES DE UPLOAD E VIEW ---
                const selectModalidade = document.getElementById('edit_modalidade_id');
                const divArquivoModalidade = document.getElementById('div_arquivo_modalidade');
                
                if (selectModalidade && divArquivoModalidade) {
                    selectModalidade.addEventListener('change', function() {
                        divArquivoModalidade.style.display = this.value ? 'block' : 'none';
                        
                        // Lógica de Trava: Se voltar para a licença original que já tinha arquivo, mostra o arquivo antigo. 
                        // Se mudar para uma licença nova, obriga a fazer upload novamente.
                        const hiddenInput = document.getElementById('edit_militar_id');
                        const origMod = hiddenInput.dataset.originalModalidade;
                        const origUrl = hiddenInput.dataset.originalUrl;
                        
                        if (this.value === origMod && origUrl && origUrl !== "None" && origUrl !== "") {
                            document.getElementById('bloco_upload_modalidade').style.display = 'none';
                            document.getElementById('bloco_view_modalidade').style.display = 'flex';
                            document.getElementById('link_view_modalidade').href = origUrl;
                        } else {
                            document.getElementById('bloco_upload_modalidade').style.display = 'block';
                            document.getElementById('bloco_view_modalidade').style.display = 'none';
                        }
                    });
                }

                document.querySelectorAll('.check-curso').forEach(checkbox => {
                    checkbox.addEventListener('change', function() {
                        const container = document.getElementById('container_arquivo_' + this.value);
                        if (container) {
                            container.style.display = this.checked ? 'block' : 'none';
                        }
                    });
                });

                // --- ABERTURA DO MODAL ---
                $('#militaresTable tbody').on('click', '.btn-editar', function () {
                    const btn = this;

                    // 1. Limpa rastros do militar anterior
                    document.querySelectorAll('input[type="file"]').forEach(fileInput => fileInput.value = '');
                    document.querySelectorAll('.check-curso').forEach(c => {
                        c.checked = false;
                        c.readOnly = false;
                        c.classList.remove('locked-checkbox');
                        const upBox = document.getElementById('bloco_upload_curso_' + c.value);
                        const viewBox = document.getElementById('bloco_view_curso_' + c.value);
                        if (upBox) upBox.style.display = 'block';
                        if (viewBox) viewBox.style.display = 'none';
                    });
                    
                    // 2. Preenchimento Base
                    const hiddenId = document.getElementById('edit_militar_id');
                    hiddenId.value = btn.dataset.id;
                    hiddenId.dataset.originalModalidade = btn.dataset.modalidade; // Armazena a licença original
                    hiddenId.dataset.originalUrl = btn.dataset.comprovanteModalidade; // Armazena a URL original da licença

                    document.getElementById('edit_obm_id').value = btn.dataset.obmId;
                    document.getElementById('modalNomeMilitar').textContent = btn.dataset.nome;
                    document.getElementById('edit_inicio_periodo').value = btn.dataset.inicio;
                    document.getElementById('edit_fim_periodo').value = btn.dataset.fim;

                    // 3. Gatilho de Situação (O change vai verificar a originalidade automaticamente)
                    selectModalidade.value = btn.dataset.modalidade;
                    selectModalidade.dispatchEvent(new Event('change'));

                    // 4. Lógica de Lotação
                    const switchPresente = document.getElementById('edit_presente_na_obm');
                    const divLocal = document.getElementById('div_local_disposicao');
                    const inputLocal = document.getElementById('edit_local_disposicao');
                    switchPresente.checked = (btn.dataset.presente === 'true');
                    inputLocal.value = btn.dataset.local;
                    divLocal.style.display = switchPresente.checked ? 'none' : 'block';

                    // 5. Lógica Viatura
                    document.getElementById('bloco_viatura_diaria').style.display = 'block';
                    document.getElementById('edit_viatura_diaria_id').value = btn.dataset.viaturaDiaria || "";

                    // 6. Lógica de Especialidades e Trava de Arquivos (JSON Parsing)
                    const cursosInfo = JSON.parse(btn.dataset.cursosInfo || "[]");
                    cursosInfo.forEach(curso => {
                        const checkbox = document.getElementById('curso_' + curso.id);
                        if(checkbox) {
                            checkbox.checked = true;
                            // Se já tem URL salva, esconde o campo de upload e trava a edição
                            if(curso.url && curso.url !== "None" && curso.url !== "") {
                                checkbox.readOnly = true;
                                checkbox.classList.add('locked-checkbox'); // Trava visual (impede clique)
                                
                                document.getElementById('bloco_upload_curso_' + curso.id).style.display = 'none';
                                document.getElementById('bloco_view_curso_' + curso.id).style.display = 'block';
                                document.getElementById('link_view_curso_' + curso.id).href = curso.url;
                            }
                            checkbox.dispatchEvent(new Event('change'));
                        }
                    });

                    modalChefia.show();
                });

                document.getElementById('edit_presente_na_obm').addEventListener('change', function() {
                    document.getElementById('div_local_disposicao').style.display = this.checked ? 'none' : 'block';
                });

                document.getElementById('btnSalvarChefia').onclick = function() {
                    const btn = this;
                    btn.disabled = true;
                    btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Processando...';
                    
                    fetch('/gestao-chefia/update', { 
                        method: 'POST', 
                        body: new FormData(document.getElementById('formAtualizacaoChefia')) 
                    })
                    .then(r => r.json())
                    .then(data => {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="bi bi-save me-1"></i> Salvar Mapa da Força';
                        if (data.status === 'success') {
                            bootstrap.Modal.getInstance(document.getElementById('modalEdicaoChefia')).hide();
                            document.getElementById('obmSelect').dispatchEvent(new Event('change'));
                        } else { 
                            alert(data.message); 
                        }
                    })
                    .catch(err => {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="bi bi-save me-1"></i> Salvar Mapa da Força';
                        alert("Erro de comunicação com o servidor.");
                    });
                };
            });
    });
</script>
{% endblock %}
